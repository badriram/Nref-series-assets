<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="540" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: 'Latin Modern Roman', 'CMU Serif', 'Times New Roman', serif; }
  .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
  .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
</style>

<text class="th" x="170" y="24" text-anchor="middle">Classical (Paper I)</text>
<text class="ts" x="170" y="40" text-anchor="middle">Sharp k-factor</text>
<text class="th" x="510" y="24" text-anchor="middle">Quantum (Paper II)</text>
<text class="ts" x="510" y="40" text-anchor="middle">k-factor is an operator</text>

<line x1="340" y1="50" x2="340" y2="500" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 4"/>

<text class="ts" x="170" y="68" text-anchor="middle" fill="#0F6E56">Passenger T: sharp momentum</text>
<text class="ts" x="510" y="68" text-anchor="middle" fill="#534AB7">Passenger T: momentum superposition</text>

<!-- Left axis -->
<line x1="170" y1="80" x2="170" y2="430" stroke="#2C2C2A" stroke-width="1"/>
<line x1="170" y1="80" x2="170" y2="430" stroke="#2C2C2A" stroke-width="2" opacity="0.12"/>
<line x1="164" y1="160" x2="176" y2="160" stroke="#2C2C2A" stroke-width="0.5"/>
<text class="ts" x="158" y="164" text-anchor="end">N/k</text>
<line x1="164" y1="260" x2="176" y2="260" stroke="#2C2C2A" stroke-width="0.5"/>
<text class="ts" x="158" y="264" text-anchor="end">N&#x2080;</text>
<line x1="164" y1="360" x2="176" y2="360" stroke="#2C2C2A" stroke-width="0.5"/>
<text class="ts" x="158" y="364" text-anchor="end">Nk</text>

<!-- Right axis -->
<line x1="510" y1="80" x2="510" y2="430" stroke="#2C2C2A" stroke-width="1"/>
<line x1="510" y1="80" x2="510" y2="430" stroke="#2C2C2A" stroke-width="2" opacity="0.12"/>
<line x1="504" y1="160" x2="516" y2="160" stroke="#2C2C2A" stroke-width="0.5"/>
<text class="ts" x="498" y="164" text-anchor="end">N/k</text>
<line x1="504" y1="260" x2="516" y2="260" stroke="#2C2C2A" stroke-width="0.5"/>
<text class="ts" x="498" y="264" text-anchor="end">N&#x2080;</text>
<line x1="504" y1="360" x2="516" y2="360" stroke="#2C2C2A" stroke-width="0.5"/>
<text class="ts" x="498" y="364" text-anchor="end">Nk</text>

<!-- Left: classical signals -->
<line x1="60" y1="260" x2="170" y2="160" stroke="#EF9F27" stroke-width="1" stroke-dasharray="3 3"/>
<line x1="280" y1="260" x2="170" y2="360" stroke="#EF9F27" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>
<circle cx="170" cy="160" r="5" fill="#0F6E56"/>
<circle cx="170" cy="360" r="5" fill="#0F6E56"/>

<!-- Left: sharp bracket -->
<line x1="178" y1="160" x2="178" y2="360" stroke="#0F6E56" stroke-width="1.5"/>
<line x1="174" y1="160" x2="182" y2="160" stroke="#0F6E56" stroke-width="1"/>
<line x1="174" y1="360" x2="182" y2="360" stroke="#0F6E56" stroke-width="1"/>
<text class="ts" x="194" y="256" text-anchor="start" fill="#085041">Sharp gap</text>
<text class="ts" x="194" y="270" text-anchor="start" fill="#085041">= 2N&#x2080;&#x3B2;&#x3B3;</text>

<!-- Right: quantum signals -->
<line x1="400" y1="260" x2="510" y2="160" stroke="#EF9F27" stroke-width="1" stroke-dasharray="3 3"/>
<line x1="620" y1="260" x2="510" y2="360" stroke="#EF9F27" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>

<!-- Right: blurred reception (concentric ovals) -->
<rect x="516" y="130" width="8" height="60" rx="4" fill="#EEEDFE" stroke="none"/>
<rect x="517" y="140" width="6" height="40" rx="3" fill="#CECBF6" stroke="none"/>
<rect x="518" y="148" width="4" height="24" rx="2" fill="#AFA9EC" stroke="none"/>
<circle cx="520" cy="160" r="3" fill="#534AB7"/>

<rect x="516" y="330" width="8" height="60" rx="4" fill="#EEEDFE" stroke="none"/>
<rect x="517" y="340" width="6" height="40" rx="3" fill="#CECBF6" stroke="none"/>
<rect x="518" y="348" width="4" height="24" rx="2" fill="#AFA9EC" stroke="none"/>
<circle cx="520" cy="360" r="3" fill="#534AB7"/>

<!-- Right: uncertainty bars -->
<rect x="530" y="128" width="2" height="64" rx="1" fill="#534AB7" opacity="0.15"/>
<rect x="530" y="328" width="2" height="64" rx="1" fill="#534AB7" opacity="0.15"/>

<text class="ts" x="542" y="156" text-anchor="start" fill="#3C3489">&#x27E8;N/k&#x27E9; &#xB1; &#x3C3;</text>
<text class="ts" x="542" y="170" text-anchor="start" fill="#534AB7">Blurred reception</text>
<text class="ts" x="542" y="356" text-anchor="start" fill="#3C3489">&#x27E8;Nk&#x27E9; &#xB1; &#x3C3;</text>
<text class="ts" x="542" y="370" text-anchor="start" fill="#534AB7">Blurred reception</text>

<!-- Right: spread gap bracket -->
<line x1="526" y1="130" x2="526" y2="390" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="4 3"/>
<line x1="522" y1="130" x2="530" y2="130" stroke="#E24B4A" stroke-width="1"/>
<line x1="522" y1="390" x2="530" y2="390" stroke="#E24B4A" stroke-width="1"/>
<text class="ts" x="542" y="256" text-anchor="start" fill="#A32D2D">Spread gap:</text>
<text class="ts" x="542" y="270" text-anchor="start" fill="#A32D2D">mean + uncertainty</text>
<text class="ts" x="542" y="284" text-anchor="start" fill="#791F1F">&#x394;t' ~ &#x3C3;&#x209A;x/(mc)</text>

<!-- Bottom annotation -->
<line x1="40" y1="452" x2="640" y2="452" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="ts" x="170" y="472" text-anchor="middle" fill="#085041">Classical: two sharp dots, one gap.</text>
<text class="ts" x="170" y="488" text-anchor="middle" fill="#085041">The bookkeeping is exact.</text>
<text class="ts" x="510" y="472" text-anchor="middle" fill="#3C3489">Quantum: two probability clouds, a spread gap.</text>
<text class="ts" x="510" y="488" text-anchor="middle" fill="#3C3489">The bookkeeping has uncertainty &#x3C3;&#x209A;/(mc).</text>

<text class="ts" x="340" y="520" text-anchor="middle">When the k-factor is an operator, the radar lines blur. The gap acquires quantum uncertainty.</text>
<text class="ts" x="340" y="536" text-anchor="middle">This uncertainty is the simultaneity decoherence predicted in &#xA7;V.</text>
</svg>
