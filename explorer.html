<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physics Ontology — Axiom Explorer</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; background: #0d1117; color: #c9d1d9; overflow: hidden; }

#app { display: flex; height: 100vh; }
#graph-container { flex: 1; position: relative; }
#sidebar { width: 380px; background: #161b22; border-left: 1px solid #30363d; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }

/* Controls */
#controls { position: absolute; top: 16px; left: 16px; z-index: 10; display: flex; flex-direction: column; gap: 8px; }
#controls .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
.btn { padding: 6px 14px; border: 1px solid #30363d; border-radius: 6px; background: #21262d; color: #c9d1d9; cursor: pointer; font-size: 12px; font-family: inherit; transition: all 0.15s; }
.btn:hover { background: #30363d; }
.btn.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }

/* Legend */
#legend { position: absolute; bottom: 16px; left: 16px; z-index: 10; background: #161b22ee; border: 1px solid #30363d; border-radius: 8px; padding: 12px; font-size: 11px; }
#legend .item { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
#legend .dot { width: 12px; height: 12px; border-radius: 50%; }

/* Status bar */
#status { font-size: 11px; color: #8b949e; padding: 4px 0; }

/* Sidebar content */
#sidebar h2 { font-size: 14px; color: #58a6ff; margin-bottom: 4px; }
#sidebar h3 { font-size: 12px; color: #8b949e; margin-top: 12px; margin-bottom: 4px; }
#sidebar .equation { font-size: 13px; color: #f0883e; margin: 8px 0; overflow-x: auto; }
#sidebar .description { font-size: 11px; color: #8b949e; line-height: 1.5; }
#sidebar .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; margin: 2px; }
#sidebar .tag-scale { background: #1f6feb33; color: #58a6ff; }
#sidebar .tag-domain { background: #23863633; color: #3fb950; }
#sidebar .tag-status { background: #f0883e33; color: #f0883e; }
#sidebar .tag-root { background: #da363333; color: #f85149; }
#sidebar .path-step { padding: 6px 8px; margin: 2px 0; background: #21262d; border-radius: 4px; font-size: 11px; border-left: 3px solid #30363d; cursor: pointer; }
#sidebar .path-step:hover { background: #30363d; }
#sidebar .path-step.highlighted { border-left-color: #f0883e; background: #f0883e22; }
#sidebar .assumption { font-size: 10px; color: #8b949e; padding-left: 12px; }

/* Instructions */
#instructions { position: absolute; bottom: 16px; right: 400px; z-index: 10; background: #161b22ee; border: 1px solid #30363d; border-radius: 8px; padding: 10px 14px; font-size: 11px; color: #8b949e; max-width: 280px; }
#instructions strong { color: #c9d1d9; }

/* SVG */
svg { width: 100%; height: 100%; }
.link { stroke-opacity: 0.3; fill: none; }
.link.highlighted { stroke-opacity: 1; stroke-width: 3px !important; }
.link.dimmed { stroke-opacity: 0.05; }
.node circle { stroke-width: 1.5px; cursor: pointer; transition: r 0.2s; }
.node circle:hover { filter: brightness(1.3); }
.node.dimmed circle { opacity: 0.15; }
.node.highlighted circle { stroke: #fff; stroke-width: 3px; filter: brightness(1.4); }
.node text { font-size: 9px; fill: #8b949e; pointer-events: none; }
.node.dimmed text { opacity: 0.1; }
.node.highlighted text { fill: #fff; font-weight: bold; }
.link-arrow { fill: #8b949e; opacity: 0.3; }
.link-arrow.highlighted { opacity: 0.8; }
.tension-line { stroke: #f85149; stroke-dasharray: 4,4; stroke-opacity: 0; pointer-events: none; }
.tension-line.visible { stroke-opacity: 0.6; }
.tension-line.resolved { stroke: #3fb950; stroke-opacity: 0.3; stroke-dasharray: 2,6; }
</style>
</head>
<body>
<div id="app">
  <div id="graph-container">
    <svg id="graph"></svg>

    <div id="controls">
      <div class="btn-row">
        <button class="btn" data-mode="root" onclick="setColorMode('root')">Combined</button>
        <button class="btn" data-mode="temporal" onclick="setColorMode('temporal')">Temporal</button>
        <button class="btn" data-mode="scale" onclick="setColorMode('scale')">Scale</button>
        <button class="btn" data-mode="nref" onclick="setColorMode('nref')">N_ref</button>
        <button class="btn active" data-mode="standard" onclick="setColorMode('standard')">Standard</button>
      </div>
      <div id="status">Loading...</div>
    </div>

    <div id="legend"></div>

    <div id="instructions">
      <strong>Click</strong> a node to trace to root.<br>
      <strong>Shift+Click</strong> a second node to find all paths between them.<br>
      <strong>Escape</strong> to clear selection.
    </div>
  </div>

  <div id="sidebar">
    <h2>Physics Ontology Explorer</h2>
    <div class="description">67 relations, 3 axiom roots, 501 edges.<br>Click any relation to explore.<br><a href="index.html" style="color:#58a6ff;text-decoration:none;font-size:11px;">← Back to N_ref</a></div>
    <div id="sidebar-content"></div>
  </div>
</div>

<script>
// ── Process raw NetworkX graph.json into app format ──

function processRawGraph(raw) {
  // raw is NetworkX node-link format: {nodes: [...], links: [...]}
  const linksKey = raw.links ? 'links' : 'edges';
  const rawNodes = raw.nodes || [];
  const rawLinks = raw[linksKey] || [];

  // Index nodes by id
  const nodeById = new Map();
  rawNodes.forEach(n => nodeById.set(n.id, n));

  // Extract relations only
  const relations = rawNodes.filter(n => n.node_type === 'relation');

  // Extract derives_from edges between relations
  const derivesEdges = [];
  const seen = new Set();
  rawLinks.forEach(e => {
    if (e.edge_type !== 'derives_from') return;
    const src = nodeById.get(e.source);
    const tgt = nodeById.get(e.target);
    if (!src || !tgt || src.node_type !== 'relation' || tgt.node_type !== 'relation') return;
    const key = `${e.source}|${e.target}|${e.framework || 'both'}`;
    if (seen.has(key)) return;
    seen.add(key);
    derivesEdges.push({
      source: e.source, target: e.target,
      connection_type: e.connection_type || '?',
      framework: e.framework || 'both',
      assumptions: e.assumptions || [],
      proof_sketch: (e.proof_sketch || '').substring(0, 200),
      reference: e.reference || '',
    });
  });

  // Extract tension edges
  const tensions = [];
  rawLinks.forEach(e => {
    if (e.edge_type !== 'tension_with') return;
    tensions.push({
      relation_a: e.source, relation_b: e.target,
      variable: e.variable_id || '',
      role_in_a: e.role_in_a || '', role_in_b: e.role_in_b || '',
      description: e.description || '',
      status: e.status || 'open',
      resolved_by: e.resolved_by_framework || null,
      resolution: e.resolution_mechanism || '',
    });
  });

  // Build adjacency for root tracing
  const axiomRoots = {
    'PRO:R067': 'counting', 'PRO:R068': 'einstein',
    'PRO:R018': 'quantisation', 'PRO:R066': 'gauge'
  };

  function buildAdj(framework) {
    const adj = new Map();
    derivesEdges.forEach(e => {
      const fw = e.framework;
      if (framework && fw !== framework && fw !== 'both') return;
      if (!adj.has(e.source)) adj.set(e.source, []);
      adj.get(e.source).push(e.target);
    });
    return adj;
  }

  function traceToRoots(rid, adj, visited) {
    if (!visited) visited = new Set();
    if (visited.has(rid)) return new Set();
    visited.add(rid);
    const parents = adj.get(rid) || [];
    if (parents.length === 0) return new Set([rid]);
    const roots = new Set();
    parents.forEach(p => traceToRoots(p, adj, visited).forEach(r => roots.add(r)));
    return roots;
  }

  function shortestPath(rid, target, adj) {
    const queue = [[rid, [rid]]];
    const visited = new Set([rid]);
    while (queue.length > 0) {
      const [current, path] = queue.shift();
      if (current === target) return path;
      (adj.get(current) || []).forEach(next => {
        if (!visited.has(next)) {
          visited.add(next);
          queue.push([next, [...path, next]]);
        }
      });
    }
    return null;
  }

  function primaryRoot(roots) {
    for (const r of roots) { if (axiomRoots[r]) return axiomRoots[r]; }
    return 'none';
  }

  const adjAll = buildAdj(null);
  const adjNref = buildAdj('nref');
  const adjStd = buildAdj('standard');

  // Get temporal exposure from appears_in edges
  const temporalVars = new Map();
  rawLinks.forEach(e => {
    if (e.edge_type !== 'appears_in') return;
    const varNode = nodeById.get(e.source);
    if (!varNode || !varNode.si_decomposition) return;
    if ((varNode.si_decomposition.s || 0) !== 0) {
      if (!temporalVars.has(e.target)) temporalVars.set(e.target, []);
      temporalVars.get(e.target).push(varNode.symbol || e.source);
    }
  });

  // Count children
  const childCount = new Map();
  derivesEdges.forEach(e => {
    childCount.set(e.target, (childCount.get(e.target) || 0) + 1);
  });

  // Build nodes
  const nodes = relations.map(r => {
    const nrefRoots = traceToRoots(r.id, adjNref);
    const stdRoots = traceToRoots(r.id, adjStd);
    const allRoots = traceToRoots(r.id, adjAll);

    const nrefPrimary = [...nrefRoots].find(x => axiomRoots[x]) || null;
    const stdPrimary = [...stdRoots].find(x => axiomRoots[x]) || null;
    const allPrimary = [...allRoots].find(x => axiomRoots[x]) || null;

    const tv = temporalVars.get(r.id) || [];

    return {
      id: r.id, name: r.name || '',
      equation: r.equation_latex || '',
      description: (r.description || '').substring(0, 300),
      domain: r.domain || '', status: r.status || '',
      scale: r.geometric_scale || null,
      root_nref: primaryRoot(nrefRoots),
      root_standard: primaryRoot(stdRoots),
      primary_root: primaryRoot(allRoots),
      root_path: allPrimary ? shortestPath(r.id, allPrimary, adjAll) : null,
      root_path_nref: nrefPrimary ? shortestPath(r.id, nrefPrimary, adjNref) : null,
      root_path_standard: stdPrimary ? shortestPath(r.id, stdPrimary, adjStd) : null,
      temporal_entangled: tv.length > 0,
      temporal_vars: tv,
      children_count: childCount.get(r.id) || 0,
      is_root: !!axiomRoots[r.id],
    };
  });

  return { nodes, edges: derivesEdges, tensions, stats: {
    total_relations: nodes.length, total_edges: derivesEdges.length,
    total_tensions: tensions.length,
  }};
}

// ── Data & State ──
let graphData = null;
let colorMode = 'standard';
let selectedNode = null;
let secondNode = null;
let simulation = null;

// ── Colors ──
const ROOT_COLORS = {
  counting: '#f85149',
  einstein: '#f85149',
  quantisation: '#58a6ff',
  gauge: '#f0883e',
  none: '#484f58',
};
const TEMPORAL_COLORS = { true: '#f85149', false: '#484f58' };
const SCALE_COLORS = {
  point: '#f85149',
  trajectory: '#f0883e',
  field: '#58a6ff',
  boundary: '#a371f7',
  global: '#3fb950',
  null: '#484f58',
};
const EDGE_STYLES = {
  algebraic_identity: { dash: '', width: 1.5 },
  derived: { dash: '', width: 1.2 },
  quantization: { dash: '6,3', width: 1.5 },
  analytic_continuation: { dash: '4,4', width: 1 },
  conjectured: { dash: '2,4', width: 1 },
  definitional: { dash: '', width: 1 },
  deparametrization: { dash: '8,3', width: 1 },
  experimental_identification: { dash: '3,3', width: 1.5 },
};

// ── Load & Render ──
async function init() {
  let raw;
  // Try embedded raw graph first (standalone), then fetch export, then fetch raw
  if (window.__RAW_GRAPH__) {
    raw = window.__RAW_GRAPH__;
  } else {
    try {
      const resp = await fetch('graph_data.json');
      const data = await resp.json();
      if (data.nodes && data.nodes[0] && data.nodes[0].root_nref !== undefined) {
        // Already processed export format
        graphData = data;
        render();
        return;
      }
      raw = data;
    } catch(e) {
      try { const r2 = await fetch('../data/graph.json'); raw = await r2.json(); }
      catch(e2) { document.getElementById('status').textContent = 'Failed to load graph'; return; }
    }
  }
  graphData = processRawGraph(raw);
  render();
  document.getElementById('status').textContent =
    `${graphData.stats.total_relations} relations | ${graphData.stats.total_edges} derivation edges | N_ref: 3 roots | Standard: 3 roots`;
}

function render() {
  const svg = d3.select('#graph');
  const container = document.getElementById('graph-container');
  const width = container.clientWidth;
  const height = container.clientHeight;

  svg.selectAll('*').remove();

  // Defs for arrows
  const defs = svg.append('defs');
  defs.append('marker')
    .attr('id', 'arrowhead')
    .attr('viewBox', '0 -5 10 10')
    .attr('refX', 20)
    .attr('refY', 0)
    .attr('markerWidth', 6)
    .attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path')
    .attr('d', 'M0,-4L10,0L0,4')
    .attr('fill', '#484f58');

  const g = svg.append('g');

  // Zoom
  const zoom = d3.zoom()
    .scaleExtent([0.2, 5])
    .on('zoom', (e) => g.attr('transform', e.transform));
  svg.call(zoom);

  // Build link/node data
  const nodes = graphData.nodes.map(d => ({...d}));
  const nodeMap = new Map(nodes.map(n => [n.id, n]));

  const links = graphData.edges
    .filter(e => nodeMap.has(e.source) && nodeMap.has(e.target))
    .map(e => ({...e, source: e.source, target: e.target}));

  // Pin roots at top
  const rootPositions = {
    'PRO:R067': { x: width * 0.3, y: 80 },
    'PRO:R018': { x: width * 0.5, y: 80 },
    'PRO:R066': { x: width * 0.7, y: 80 },
    'PRO:R001': { x: width * 0.3, y: 80 },
  };

  nodes.forEach(n => {
    if (rootPositions[n.id]) {
      n.fx = rootPositions[n.id].x;
      n.fy = rootPositions[n.id].y;
    }
  });

  // Simulation
  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(80).strength(0.3))
    .force('charge', d3.forceManyBody().strength(-400))
    .force('center', d3.forceCenter(width / 2, height / 2 + 60))
    .force('y', d3.forceY(height / 2 + 60).strength(0.05))
    .force('collision', d3.forceCollide().radius(d => getRadius(d) + 5));

  // Links
  const link = g.append('g')
    .selectAll('line')
    .data(links)
    .join('line')
    .attr('class', 'link')
    .attr('stroke', '#30363d')
    .attr('stroke-width', d => (EDGE_STYLES[d.connection_type] || {}).width || 1)
    .attr('stroke-dasharray', d => (EDGE_STYLES[d.connection_type] || {}).dash || '')
    .attr('marker-end', 'url(#arrowhead)');

  // Tension lines
  const tensionData = (graphData.tensions || [])
    .filter(t => nodeMap.has(t.relation_a) && nodeMap.has(t.relation_b));

  const tensionLine = g.append('g')
    .selectAll('line')
    .data(tensionData)
    .join('line')
    .attr('class', 'tension-line')
    .attr('stroke-width', 2);

  window._tensionLines = tensionLine;
  window._tensionData = tensionData;

  // Nodes
  const node = g.append('g')
    .selectAll('g')
    .data(nodes)
    .join('g')
    .attr('class', 'node')
    .call(d3.drag()
      .on('start', dragStarted)
      .on('drag', dragged)
      .on('end', dragEnded));

  node.append('circle')
    .attr('r', d => getRadius(d))
    .attr('fill', d => getColor(d))
    .attr('stroke', d => d.is_root ? '#fff' : '#30363d')
    .on('click', (event, d) => handleClick(event, d, nodes, links, link, node));

  node.append('text')
    .attr('dy', d => getRadius(d) + 12)
    .attr('text-anchor', 'middle')
    .text(d => abbreviate(d.name));

  // Tick
  simulation.on('tick', () => {
    link
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
    tensionLine.each(function(t) {
      const a = nodeMap.get(t.relation_a);
      const b = nodeMap.get(t.relation_b);
      if (a && b) {
        d3.select(this).attr('x1', a.x).attr('y1', a.y).attr('x2', b.x).attr('y2', b.y);
      }
    });
  });

  // Store references for color updates
  window._nodes = node;
  window._links = link;
  window._nodeData = nodes;
  window._linkData = links;

  updateLegend();

  // Apply initial color mode (standard framework)
  setColorMode(colorMode);

  // Key handler
  document.onkeydown = (e) => {
    if (e.key === 'Escape') clearSelection(link, node);
  };
}

// ── Sizing ──
function getRadius(d) {
  if (d.is_root) return 16;
  return Math.max(6, Math.min(14, 4 + d.children_count * 1.5));
}

// ── Coloring ──
function getColor(d) {
  if (colorMode === 'root') return ROOT_COLORS[d.primary_root] || '#484f58';
  if (colorMode === 'nref') return ROOT_COLORS[d.root_nref] || '#484f58';
  if (colorMode === 'standard') return ROOT_COLORS[d.root_standard] || '#484f58';
  if (colorMode === 'temporal') return TEMPORAL_COLORS[d.temporal_entangled] || '#484f58';
  if (colorMode === 'scale') return SCALE_COLORS[d.scale] || SCALE_COLORS['null'];
  return '#484f58';
}

function setColorMode(mode) {
  colorMode = mode;
  document.querySelectorAll('#controls .btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  // Clear any active selection/trace and reset inline styles
  selectedNode = null;
  secondNode = null;
  if (window._nodes) {
    window._nodes.classed('dimmed', false).classed('highlighted', false);
  }
  if (window._links) {
    window._links.classed('dimmed', false).classed('highlighted', false);
    window._links.attr('stroke', null).attr('stroke-width', null).attr('stroke-opacity', null);
  }
  if (window._nodes) {
    window._nodes.select('circle').transition().duration(400).attr('fill', d => getColor(d));
  }
  // Filter and color edges by framework
  if (window._links && window._nodeData) {
    const nodeMap = new Map(window._nodeData.map(n => [n.id, n]));
    window._links.transition().duration(400)
      .attr('stroke-opacity', d => {
        if (mode === 'nref') {
          return (d.framework === 'nref' || d.framework === 'both') ? 0.5 : 0.04;
        } else if (mode === 'standard') {
          return (d.framework === 'standard' || d.framework === 'both') ? 0.5 : 0.04;
        }
        return 0.3;
      })
      .attr('stroke', d => {
        // Dim edges not in this framework
        if (mode === 'nref' && d.framework === 'standard') return '#30363d';
        if (mode === 'standard' && d.framework === 'nref') return '#30363d';
        // Color active edges by the root of their source node
        if (mode === 'nref' || mode === 'standard') {
          const srcId = typeof d.source === 'object' ? d.source.id : d.source;
          const src = nodeMap.get(srcId);
          if (src) {
            const rootKey = mode === 'nref' ? src.root_nref : src.root_standard;
            return ROOT_COLORS[rootKey] || '#484f58';
          }
        }
        return '#30363d';
      })
      .attr('stroke-width', d => {
        if (mode === 'nref' && d.framework === 'nref') return 3;
        if (mode === 'standard' && d.framework === 'standard') return 3;
        return (EDGE_STYLES[d.connection_type] || {}).width || 1;
      });
  }

  // Show tensions based on framework
  if (window._tensionLines) {
    window._tensionLines.transition().duration(400)
      .attr('class', d => {
        if (mode === 'nref' || mode === 'standard') {
          const resolved = d.resolved_by === mode;
          if (resolved) return 'tension-line resolved visible';
          return 'tension-line visible';
        }
        return 'tension-line';
      });
  }

  updateLegend();
}

function updateLegend() {
  const leg = document.getElementById('legend');
  let items = [];
  if (colorMode === 'root') {
    items = [
      { color: ROOT_COLORS.counting, label: 'Counting / Einstein (Axiom 1)' },
      { color: ROOT_COLORS.quantisation, label: 'de Broglie / hbar (Axiom 2)' },
      { color: ROOT_COLORS.gauge, label: 'Higgs potential (Axiom 3)' },
      { color: ROOT_COLORS.none, label: 'Unrooted' },
    ];
  } else if (colorMode === 'nref') {
    const nrefTensions = (graphData.tensions || []).filter(t => t.status !== 'resolved_by' || t.resolved_by !== 'nref');
    const nrefResolved = (graphData.tensions || []).filter(t => t.status === 'resolved_by' && t.resolved_by === 'nref');
    items = [
      { color: ROOT_COLORS.counting, label: 'N_ref counting axioms' },
      { color: ROOT_COLORS.quantisation, label: 'de Broglie' },
      { color: ROOT_COLORS.gauge, label: 'Higgs potential' },
      { color: '#f85149', label: `Tensions: ${nrefTensions.length} open` },
      { color: '#3fb950', label: `Resolved: ${nrefResolved.length}` },
    ];
  } else if (colorMode === 'standard') {
    const stdTensions = (graphData.tensions || []);
    items = [
      { color: ROOT_COLORS.einstein, label: "Einstein's postulates" },
      { color: ROOT_COLORS.quantisation, label: 'de Broglie' },
      { color: ROOT_COLORS.gauge, label: 'Higgs potential' },
      { color: '#f85149', label: `Tensions: ${stdTensions.length} open` },
    ];
  } else if (colorMode === 'temporal') {
    items = [
      { color: TEMPORAL_COLORS.true, label: 'Temporally entangled (46)' },
      { color: TEMPORAL_COLORS.false, label: 'Temporally free (21)' },
    ];
  } else if (colorMode === 'scale') {
    items = [
      { color: SCALE_COLORS.point, label: 'Point (14)' },
      { color: SCALE_COLORS.trajectory, label: 'Trajectory (13)' },
      { color: SCALE_COLORS.field, label: 'Field (27)' },
      { color: SCALE_COLORS.boundary, label: 'Boundary (6)' },

// ── Interaction ──
function handleClick(event, d, nodes, links, linkSel, nodeSel) {
  if (event.shiftKey && selectedNode) {
    secondNode = d;
    showPathsBetween(selectedNode, d, nodes, links, linkSel, nodeSel);
    return;
  }

  clearSelection(linkSel, nodeSel);
  selectedNode = d;
  secondNode = null;

  // Use framework-specific path if in a framework mode
  const pathToUse = (colorMode === 'nref' && d.root_path_nref) ? d.root_path_nref
                  : (colorMode === 'standard' && d.root_path_standard) ? d.root_path_standard
                  : d.root_path;
  if (pathToUse && pathToUse.length > 1) {
    animatePathToRoot({...d, root_path: pathToUse}, linkSel, nodeSel);
  }

  showSidebar(d);
}

function animatePathToRoot(d, linkSel, nodeSel) {
  const path = d.root_path;
  const pathSet = new Set(path);

  // Dim everything
  nodeSel.classed('dimmed', n => !pathSet.has(n.id));
  nodeSel.classed('highlighted', n => pathSet.has(n.id));
  linkSel.classed('dimmed', l => {
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    return !(pathSet.has(sid) && pathSet.has(tid));
  });

  // Animate path edges sequentially
  for (let i = 0; i < path.length - 1; i++) {
    const from = path[i];
    const to = path[i + 1];
    setTimeout(() => {
      linkSel.filter(l => {
        const sid = typeof l.source === 'object' ? l.source.id : l.source;
        const tid = typeof l.target === 'object' ? l.target.id : l.target;
        return sid === from && tid === to;
      })
      .classed('highlighted', true)
      .classed('dimmed', false)
      .attr('stroke', '#f0883e')
      .attr('stroke-width', 3);
    }, i * 300);
  }
}

function showPathsBetween(a, b, nodes, links, linkSel, nodeSel) {
  // BFS to find all paths (up to depth 8)
  const allPaths = findAllPaths(a.id, b.id, 8);

  if (allPaths.length === 0) {
    // Try reverse
    const revPaths = findAllPaths(b.id, a.id, 8);
    if (revPaths.length > 0) {
      showPathsBetween(b, a, nodes, links, linkSel, nodeSel);
      return;
    }
    showSidebarText(`No path found between ${a.name} and ${b.name}`);
    return;
  }

  // Highlight all nodes/edges in any path
  const allNodes = new Set();
  const allEdges = new Set();
  allPaths.forEach(path => {
    path.forEach(n => allNodes.add(n));
    for (let i = 0; i < path.length - 1; i++) {
      allEdges.add(`${path[i]}->${path[i+1]}`);
    }
  });

  nodeSel.classed('dimmed', n => !allNodes.has(n.id));
  nodeSel.classed('highlighted', n => allNodes.has(n.id));
  linkSel.classed('dimmed', l => {
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    return !allEdges.has(`${sid}->${tid}`);
  });
  linkSel.filter(l => {
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    return allEdges.has(`${sid}->${tid}`);
  })
  .classed('highlighted', true)
  .attr('stroke', '#a371f7')
  .attr('stroke-width', 2.5);

  showPathsSidebar(a, b, allPaths);
}

function findAllPaths(startId, endId, maxDepth) {
  const adj = new Map();
  graphData.edges.forEach(e => {
    if (!adj.has(e.source)) adj.set(e.source, []);
    adj.get(e.source).push(e.target);
  });

  const results = [];
  function dfs(current, target, path, visited, depth) {
    if (depth > maxDepth) return;
    if (current === target) { results.push([...path]); return; }
    const neighbors = adj.get(current) || [];
    for (const next of neighbors) {
      if (!visited.has(next)) {
        visited.add(next);
        path.push(next);
        dfs(next, target, path, visited, depth + 1);
        path.pop();
        visited.delete(next);
      }
    }
  }

  const visited = new Set([startId]);
  dfs(startId, endId, [startId], visited, 0);
  return results.sort((a, b) => a.length - b.length);
}

function clearSelection(linkSel, nodeSel) {
  selectedNode = null;
  secondNode = null;
  nodeSel.classed('dimmed', false).classed('highlighted', false);
  linkSel.classed('dimmed', false).classed('highlighted', false);
  // Reset all inline stroke overrides — let setColorMode re-apply
  linkSel.attr('stroke', null).attr('stroke-width', null).attr('stroke-opacity', null);
}

// ── Sidebar ──
function showSidebar(d) {
  const edgeToParent = graphData.edges.filter(e => e.source === d.id);
  const edgeFromChild = graphData.edges.filter(e => e.target === d.id);

  let html = `<h2>${d.name}</h2>`;
  if (d.equation) {
    try {
      const rendered = katex.renderToString(d.equation, { throwOnError: false, displayMode: true });
      html += `<div class="equation">${rendered}</div>`;
    } catch(e) {
      html += `<div class="equation">${d.equation}</div>`;
    }
  }

  html += `<div>`;
  if (d.scale) html += `<span class="tag tag-scale">${d.scale}</span>`;
  html += `<span class="tag tag-domain">${d.domain}</span>`;
  html += `<span class="tag tag-status">${d.status}</span>`;
  if (d.is_root) html += `<span class="tag tag-root">ROOT</span>`;
  html += `<span class="tag" style="background:#${d.temporal_entangled ? 'f8514933' : '484f5833'};color:#${d.temporal_entangled ? 'f85149' : '8b949e'}">${d.temporal_entangled ? 'temporal' : 'timeless'}</span>`;
  html += `</div>`;

  html += `<div class="description">${d.description}</div>`;

  // Show paths for both frameworks
  const frameworks = [
    { key: 'root_path_nref', label: 'N_ref path', color: '#f85149' },
    { key: 'root_path_standard', label: 'Standard path', color: '#58a6ff' },
  ];
  for (const fw of frameworks) {
    const path = d[fw.key];
    if (path && path.length > 1) {
      html += `<h3>${fw.label} (${path.length - 1} steps)</h3>`;
      path.forEach((nodeId, i) => {
        const node = graphData.nodes.find(n => n.id === nodeId);
        const name = node ? node.name : nodeId;
        const isLast = i === path.length - 1;
        html += `<div class="path-step${isLast ? ' highlighted' : ''}" style="border-left-color:${isLast ? fw.color : '#30363d'}">${i === 0 ? '>' : '  '} ${name}${isLast ? ' (ROOT)' : ''}</div>`;
        if (i < path.length - 1) {
          const edge = graphData.edges.find(e => e.source === path[i] && e.target === path[i+1]);
          if (edge) {
            const fwTag = edge.framework !== 'both' ? ` [${edge.framework}]` : '';
            html += `<div class="assumption">${edge.connection_type}${fwTag}${edge.assumptions.length ? ' | ' + edge.assumptions[0].substring(0, 60) : ''}</div>`;
          }
        }
      });
    }
  }

  if (edgeToParent.length > 0) {
    html += `<h3>Derives from (${edgeToParent.length})</h3>`;
    edgeToParent.forEach(e => {
      const parent = graphData.nodes.find(n => n.id === e.target);
      html += `<div class="path-step">${parent ? parent.name : e.target} <span style="color:#8b949e">[${e.connection_type}]</span></div>`;
    });
  }

  if (edgeFromChild.length > 0) {
    html += `<h3>Children (${edgeFromChild.length})</h3>`;
    edgeFromChild.forEach(e => {
      const child = graphData.nodes.find(n => n.id === e.source);
      html += `<div class="path-step">${child ? child.name : e.source}</div>`;
    });
  }

  if (d.temporal_vars && d.temporal_vars.length > 0) {
    html += `<h3>Temporal variables</h3>`;
    html += `<div class="description">${d.temporal_vars.join(', ')}</div>`;
  }

  document.getElementById('sidebar-content').innerHTML = html;
}

function showPathsSidebar(a, b, paths) {
  let html = `<h2>Paths: ${a.name} to ${b.name}</h2>`;
  html += `<div class="description">${paths.length} path(s) found</div>`;

  paths.forEach((path, pi) => {
    html += `<h3>Path ${pi + 1} (${path.length - 1} steps)</h3>`;
    path.forEach((nodeId, i) => {
      const node = graphData.nodes.find(n => n.id === nodeId);
      const name = node ? node.name : nodeId;
      html += `<div class="path-step">${name}</div>`;
      if (i < path.length - 1) {
        const edge = graphData.edges.find(e => e.source === path[i] && e.target === path[i+1]);
        if (edge) {
          html += `<div class="assumption">${edge.connection_type}${edge.framework !== 'both' ? ' [' + edge.framework + ' only]' : ''}</div>`;
        }
      }
    });
  });

  document.getElementById('sidebar-content').innerHTML = html;
}

function showSidebarText(text) {
  document.getElementById('sidebar-content').innerHTML = `<div class="description">${text}</div>`;
}

// ── Drag ──
function dragStarted(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
function dragEnded(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  if (!d.is_root) { d.fx = null; d.fy = null; }
}
